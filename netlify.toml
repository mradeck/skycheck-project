[functions]
  included_files = ["data/**/*"]

# Root-URL liefert die App ohne /skycheck.html-Suffix.
# Rewrite (Status 200) — die URL in der Adresszeile bleibt "/".
# Hostname-basierte COUNTRY-Detection in skycheck.html funktioniert weiter.
[[redirects]]
  from = "/"
  to = "/skycheck.html"
  status = 200

# Sicherheits-Header (Defense-in-Depth). Single-File-Inline-Script-PWA, daher ist
# script-src 'unsafe-inline' unvermeidbar; die Schutzwirkung gegen eingeschleuste
# Callsign-/Ortsnamen-/METAR-Payloads liefert das restriktive connect-src/img-src
# (keine Exfiltration an fremde Hosts). Zusammen mit escapeHtml doppelte Absicherung.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; img-src 'self' data: blob: https://cdnjs.cloudflare.com https://*.basemaps.cartocdn.com https://*.tile.openstreetmap.org https://server.arcgisonline.com https://uas-betrieb.de https://wms.geo.admin.ch https://servais.enaire.es; connect-src 'self' https://api.airplanes.live https://api.brightsky.dev https://photon.komoot.io https://uas-betrieb.de https://api.allorigins.win https://utm-service.dfs.de https://services.swpc.noaa.gov https://kp.gfz.de https://aviationweather.gov https://api3.geo.admin.ch https://servais.enaire.es https://services-eu1.arcgis.com; font-src 'self' data:; worker-src 'self'; manifest-src 'self'"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
